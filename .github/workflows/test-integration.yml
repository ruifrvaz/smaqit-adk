name: ADK Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-adk:
    name: Test ADK Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build ADK
        working-directory: installer
        run: make build

      - name: Test lite installation
        working-directory: installer
        run: |
          mkdir -p test-project-lite
          cd test-project-lite
          ../dist/smaqit-adk-dev lite

      - name: Validate lite-tier ADK structure
        working-directory: installer/test-project-lite
        run: |
          # L2 compiler agent
          test -f .github/agents/smaqit.L2.agent.md || (echo "Error: smaqit.L2.agent.md not found" && exit 1)

          # Lite-tier routing skills (2)
          test -f .github/skills/smaqit.create-agent/SKILL.md || (echo "Error: smaqit.create-agent/SKILL.md not found" && exit 1)
          test -f .github/skills/smaqit.create-skill/SKILL.md || (echo "Error: smaqit.create-skill/SKILL.md not found" && exit 1)

          # Compilation templates
          test -d .smaqit/templates || (echo "Error: .smaqit/templates/ not found" && exit 1)

          echo "✓ All lite-tier ADK files validated"

      - name: Verify lite-tier install boundaries
        working-directory: installer/test-project-lite
        run: |
          # Level 0 and 1 agents must NOT be installed by lite
          test ! -f .github/agents/smaqit.L0.agent.md || (echo "Error: L0 agent should not be installed by lite" && exit 1)
          test ! -f .github/agents/smaqit.L1.agent.md || (echo "Error: L1 agent should not be installed by lite" && exit 1)

          # new-principle skill must NOT be installed by lite
          test ! -f .github/skills/smaqit.new-principle/SKILL.md || (echo "Error: new-principle skill should not be installed by lite" && exit 1)

          # Prompts directory must NOT be created by lite
          test ! -d .github/prompts || (echo "Error: .github/prompts/ should not be created by lite" && exit 1)

          echo "✓ Lite-tier install boundaries verified"

      - name: Test advanced installation
        working-directory: installer
        run: |
          mkdir -p test-project-advanced
          cd test-project-advanced
          ../dist/smaqit-adk-dev advanced

      - name: Validate advanced-tier ADK structure
        working-directory: installer/test-project-advanced
        run: |
          # Level agents (installed to .github/agents/)
          test -f .github/agents/smaqit.L0.agent.md || (echo "Error: smaqit.L0.agent.md not found" && exit 1)
          test -f .github/agents/smaqit.L1.agent.md || (echo "Error: smaqit.L1.agent.md not found" && exit 1)
          test -f .github/agents/smaqit.L2.agent.md || (echo "Error: smaqit.L2.agent.md not found" && exit 1)

          # Framework
          test -d .smaqit/framework || (echo "Error: .smaqit/framework/ not found" && exit 1)
          test -f .smaqit/framework/AGENTS.md || (echo "Error: AGENTS.md not found in framework" && exit 1)

          # Templates
          test -d .smaqit/templates || (echo "Error: .smaqit/templates/ not found" && exit 1)
          test -f .smaqit/templates/agents/base-agent.template.md || (echo "Error: base-agent.template.md not found" && exit 1)

          # Advanced skills (installed to .github/skills/)
          test -f .github/skills/smaqit.new-principle/SKILL.md || (echo "Error: smaqit.new-principle/SKILL.md not found" && exit 1)

          echo "✓ Advanced-tier ADK structure validated"

      - name: Verify advanced-tier boundaries
        working-directory: installer/test-project-advanced
        run: |
          # Lite-tier .github/ content must NOT be re-installed by advanced separately
          # (they are installed via installLiteComponents, so they will exist — just not duplicated)

          # Prompts directory must NOT be created by advanced
          test ! -d .github/prompts || (echo "Error: .github/prompts/ should not be created by advanced" && exit 1)

          echo "✓ Advanced-tier install boundaries verified"
