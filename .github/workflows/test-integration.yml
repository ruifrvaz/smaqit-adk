name: ADK Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-adk:
    name: Test ADK Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build ADK
        working-directory: installer
        run: make build

      - name: Test installation
        working-directory: installer
        run: |
          mkdir -p test-project
          cd test-project
          ../dist/smaqit-adk-dev init
          
      - name: Validate ADK structure
        working-directory: installer/test-project
        run: |
          # Lite-tier agents (2) — the only files installed by init
          test -f .github/agents/smaqit.create-agent.agent.md || (echo "Error: smaqit.create-agent.agent.md not found" && exit 1)
          test -f .github/agents/smaqit.create-skill.agent.md || (echo "Error: smaqit.create-skill.agent.md not found" && exit 1)
          
          echo "✓ All 2 ADK files validated"

      - name: Verify lite-tier install boundaries
        working-directory: installer/test-project
        run: |
          # Framework and templates must NOT be distributed
          test ! -d .smaqit || (echo "Error: .smaqit/ should not be created by init" && exit 1)
          
          # Level agents must NOT be installed
          test ! -f .github/agents/smaqit.L0.agent.md || (echo "Error: L0 agent should not be installed by init" && exit 1)
          test ! -f .github/agents/smaqit.L1.agent.md || (echo "Error: L1 agent should not be installed by init" && exit 1)
          test ! -f .github/agents/smaqit.L2.agent.md || (echo "Error: L2 agent should not be installed by init" && exit 1)
          
          # Prompts directory must NOT be created
          test ! -d .github/prompts || (echo "Error: .github/prompts/ should not be created by init" && exit 1)
          
          # Skills directory must NOT be created
          test ! -d .github/skills || (echo "Error: .github/skills/ should not be created by init" && exit 1)
          
          echo "✓ Lite-tier install boundaries verified"
